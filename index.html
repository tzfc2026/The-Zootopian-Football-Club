<!DOCTYPE html>
<html lang="bn" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Zootopian Football Club (TZFC) - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tzfcDark: '#0f172a',
                        tzfcGold: '#f59e0b',
                        tzfcGreen: '#10b981'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-tzfcDark text-slate-100 min-h-full flex flex-col font-sans">

    <!-- Header & Club Info Section -->
    <header class="bg-slate-900 border-b border-slate-800 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div id="clubLogoContainer" class="w-20 h-20 rounded-full bg-slate-800 border-2 border-tzfcGold flex items-center justify-center overflow-hidden shadow-lg">
                    <i class="fa-solid fa-shield-halved text-3xl text-tzfcGold" id="clubLogoIcon"></i>
                    <img id="clubLogoImg" src="" alt="Logo" class="w-full h-full object-cover hidden">
                </div>
                <div>
                    <h1 id="clubNameDisplay" class="text-2xl md:text-3xl font-black tracking-wider text-white uppercase">The Zootopian Football Club</h1>
                    <p id="clubMottoDisplay" class="text-tzfcGold italic text-sm mt-1">"Unity, Strategy & Glory"</p>
                    <p id="clubAddressDisplay" class="text-slate-400 text-xs mt-1"><i class="fa-solid fa-location-dot mr-1"></i> Kishoreganj, Bangladesh</p>
                </div>
            </div>
            
            <!-- Quick Actions & Club Config Trigger -->
            <div class="flex flex-wrap gap-3">
                <button onclick="openClubConfigModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-xl text-sm font-semibold border border-slate-700 transition flex items-center gap-2">
                    <i class="fa-solid fa-gear text-tzfcGold"></i> ক্লাব সেটিংস
                </button>
                <button onclick="openRegistrationModal()" class="bg-tzfcGold hover:bg-amber-600 text-slate-950 px-5 py-2 rounded-xl text-sm font-bold shadow-lg shadow-amber-500/20 transition flex items-center gap-2">
                    <i class="fa-solid fa-user-plus"></i> নতুন প্লেয়ার রেজিস্টার
                </button>
            </div>
        </div>
    </header>

    <!-- Club Group Photo Banner Section -->
    <section class="max-w-7xl mx-auto px-4 mt-6 w-full">
        <div class="relative rounded-2xl overflow-hidden border border-slate-800 shadow-2xl bg-slate-900 h-64 md:h-80 flex items-center justify-center group">
            <img id="clubGroupPhoto" src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1200&q=80" alt="Club Group Photo" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition duration-500">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent"></div>
            <div class="absolute bottom-4 left-6 right-6 flex justify-between items-end">
                <div>
                    <span class="bg-tzfcGreen/20 text-tzfcGreen border border-tzfcGreen/30 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">Official Squad</span>
                    <h2 class="text-xl md:text-2xl font-bold text-white mt-1">TZFC Team Family & Batch Gallery</h2>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content & Batch Tabs Section -->
    <main class="max-w-7xl mx-auto px-4 my-8 flex-grow w-full">
        
        <!-- Batch Filter Tabs -->
        <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-6 flex-wrap gap-4">
            <div id="batchTabsContainer" class="flex items-center gap-2 overflow-x-auto pb-2">
                <!-- Dynamic Batch Tabs will load here -->
            </div>
            <div class="flex items-center gap-2 text-sm text-slate-400">
                <span id="playerCounter" class="bg-slate-800 px-3 py-1 rounded-lg border border-slate-700">মোট প্লেয়ার: 0</span>
            </div>
        </div>

        <!-- Players Grid for Selected Batch -->
        <div id="playersGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Dynamic Player Cards will load here -->
        </div>
    </main>

    <!-- Player Registration Modal -->
    <div id="registrationModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full p-6 shadow-2xl my-8">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                <h3 class="text-xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-id-card text-tzfcGold"></i> প্লেয়ার রেজিস্ট্রেশন ফর্ম</h3>
                <button onclick="closeRegistrationModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="playerRegForm" onsubmit="handlePlayerRegistration(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">ব্যাচ (Batch Name/Year)</label>
                    <input type="text" id="regBatch" required placeholder="যেমন: Batch 2024 বা 2025" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">প্লেয়ারের নাম</label>
                        <input type="text" id="regName" required placeholder="পূর্ণ নাম" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">পজিশন</label>
                        <input type="text" id="regPosition" required placeholder="যেমন: Forward / Midfielder" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">ভর্তি সাল</label>
                        <input type="number" id="regJoinYear" required placeholder="2023" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">ক্লাব ত্যাগ করার সাল (যদি থাকে)</label>
                        <input type="text" id="regLeaveYear" placeholder="বর্তমান / 2026" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">প্লেয়ারের ছবির লিংক (URL)</label>
                    <input type="url" id="regPhoto" placeholder="https://example.com/player.jpg" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">ব্যক্তিগত তথ্য ও বায়োডাটা</label>
                    <textarea id="regDetails" rows="3" placeholder="প্লেয়ারের অর্জন, জার্সি নম্বর, কন্টাক্ট বা শর্ট বায়ো..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none"></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                    <button type="button" onclick="closeRegistrationModal()" class="bg-slate-800 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-slate-700">বাতিল</button>
                    <button type="submit" class="bg-tzfcGold text-slate-950 px-6 py-2 rounded-xl text-sm font-bold hover:bg-amber-600 transition">সেভ করুন</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Club Configuration Modal -->
    <div id="clubConfigModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                <h3 class="text-xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-shield text-tzfcGold"></i> ক্লাব ব্র্যান্ডিং কনফিগারেশন</h3>
                <button onclick="closeClubConfigModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="clubConfigForm" onsubmit="handleClubConfigSave(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">ক্লাবের নাম</label>
                    <input type="text" id="cfgClubName" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">ক্লাব মোটো (Motto)</label>
                    <input type="text" id="cfgClubMotto" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">ঠিকানা</label>
                    <input type="text" id="cfgClubAddress" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">লোগো ইমেজ URL</label>
                    <input type="url" id="cfgClubLogo" placeholder="https://..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">গ্রুপ ফটো ব্যানার URL</label>
                    <input type="url" id="cfgGroupPhoto" placeholder="https://..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:border-tzfcGold outline-none">
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                    <button type="button" onclick="closeClubConfigModal()" class="bg-slate-800 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-slate-700">বাতিল</button>
                    <button type="submit" class="bg-tzfcGold text-slate-950 px-6 py-2 rounded-xl text-sm font-bold hover:bg-amber-600 transition">আপডেট করুন</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Personal Player Profile Modal (Dedicated Page View) -->
    <div id="playerProfileModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-xl w-full p-6 shadow-2xl relative overflow-hidden">
            <button onclick="closePlayerProfileModal()" class="absolute top-5 right-5 text-slate-400 hover:text-white bg-slate-800 p-2 rounded-full w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
            <div id="profileModalContent">
                <!-- Dynamic Player Personal Page Content -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-6 text-center text-xs text-slate-500">
        <p>&copy; 2026 The Zootopian Football Club (TZFC). All rights reserved.</p>
    </footer>

    <!-- Application Script -->
    <script>
        // Initial LocalStorage Data Structure
        let clubData = JSON.parse(localStorage.getItem('tzfc_club_info')) || {
            name: "The Zootopian Football Club",
            motto: "Unity, Strategy & Glory",
            address: "Kishoreganj, Bangladesh",
            logo: "",
            groupPhoto: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1200&q=80"
        };

        let playersData = JSON.parse(localStorage.getItem('tzfc_players')) || [
            { id: 1, batch: "Batch 2024", name: "Tanvir Ahmed", position: "Forward", joinYear: "2024", leaveYear: "Present", photo: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80", details: "Team Captain and primary goal scorer with excellent pace." },
            { id: 2, batch: "Batch 2024", name: "Rahim Chowdhury", position: "Midfielder", joinYear: "2024", leaveYear: "2025", photo: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=400&q=80", details: "Playmaker known for sharp through passes and vision." },
            { id: 3, batch: "Batch 2025", name: "Sakib Al Hasan", position: "Defender", joinYear: "2025", leaveYear: "Present", photo: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=400&q=80", details: "Rock solid defender and defensive anchor of Batch 2025." }
        ];

        let activeBatchTab = "";

        function initApp() {
            renderClubInfo();
            renderBatchTabs();
        }

        function renderClubInfo() {
            document.getElementById('clubNameDisplay').innerText = clubData.name;
            document.getElementById('clubMottoDisplay').innerText = `"${clubData.motto}"`;
            document.getElementById('clubAddressDisplay').innerHTML = `<i class="fa-solid fa-location-dot mr-1"></i> ${clubData.address}`;
            document.getElementById('clubGroupPhoto').src = clubData.groupPhoto;

            if(clubData.logo) {
                document.getElementById('clubLogoImg').src = clubData.logo;
                document.getElementById('clubLogoImg').classList.remove('hidden');
                document.getElementById('clubLogoIcon').classList.add('hidden');
            } else {
                document.getElementById('clubLogoImg').classList.add('hidden');
                document.getElementById('clubLogoIcon').classList.remove('hidden');
            }
        }

        function getBatches() {
            const batches = [...new Set(playersData.map(p => p.batch))];
            return batches.sort();
        }

        function renderBatchTabs() {
            const batches = getBatches();
            const container = document.getElementById('batchTabsContainer');
            container.innerHTML = '';

            if (batches.length === 0) {
                container.innerHTML = '<span class="text-slate-500 text-sm">কোনো ব্যাচ পাওয়া যায়নি। নতুন প্লেয়ার রেজিস্টার করুন।</span>';
                document.getElementById('playersGrid').innerHTML = '';
                document.getElementById('playerCounter').innerText = 'মোট প্লেয়ার: 0';
                return;
            }

            if (!activeBatchTab || !batches.includes(activeBatchTab)) {
                activeBatchTab = batches[0];
            }

            batches.forEach(batch => {
                const isActive = batch === activeBatchTab;
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-xl text-sm font-bold transition whitespace-nowrap border ${isActive ? 'bg-tzfcGold text-slate-950 border-tzfcGold shadow-lg shadow-amber-500/10' : 'bg-slate-900 text-slate-300 border-slate-800 hover:bg-slate-800'}`;
                btn.innerHTML = `<i class="fa-solid fa-layer-group mr-2"></i>${batch}`;
                btn.onclick = () => {
                    activeBatchTab = batch;
                    renderBatchTabs();
                };
                container.appendChild(btn);
            });

            renderPlayersForActiveBatch();
        }

        function renderPlayersForActiveBatch() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';

            const filtered = playersData.filter(p => p.batch === activeBatchTab);
            document.getElementById('playerCounter').innerText = `মোট প্লেয়ার: ${filtered.length}`;

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-slate-500">এই ব্যাচে কোনো প্লেয়ার নেই।</div>`;
                return;
            }

            filtered.forEach(player => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col items-center text-center shadow-xl hover:border-slate-700 transition group cursor-pointer";
                card.onclick = () => openPlayerProfile(player.id);

                card.innerHTML = `
                    <div class="w-24 h-24 rounded-full overflow-hidden border-2 border-tzfcGold mb-4 shadow-md bg-slate-950">
                        <img src="${player.photo || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80'}" alt="${player.name}" class="w-full h-full object-cover group-hover:scale-105 transition">
                    </div>
                    <h3 class="text-lg font-bold text-white mb-1">${player.name}</h3>
                    <span class="bg-tzfcGold/10 text-tzfcGold border border-tzfcGold/20 text-xs px-2.5 py-0.5 rounded-full font-semibold mb-3">${player.position}</span>
                    <div class="w-full text-xs text-slate-400 space-y-1 border-t border-slate-800 pt-3 mt-auto">
                        <div class="flex justify-between"><span>ভর্তি:</span> <strong class="text-slate-200">${player.joinYear}</strong></div>
                        <div class="flex justify-between"><span>ক্লাব ত্যাগ:</span> <strong class="text-slate-200">${player.leaveYear || 'N/A'}</strong></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Modal Handlers
        function openRegistrationModal() {
            document.getElementById('registrationModal').classList.remove('hidden');
        }
        function closeRegistrationModal() {
            document.getElementById('registrationModal').classList.add('hidden');
            document.getElementById('playerRegForm').reset();
        }

        function openClubConfigModal() {
            document.getElementById('cfgClubName').value = clubData.name;
            document.getElementById('cfgClubMotto').value = clubData.motto;
            document.getElementById('cfgClubAddress').value = clubData.address;
            document.getElementById('cfgClubLogo').value = clubData.logo;
            document.getElementById('cfgGroupPhoto').value = clubData.groupPhoto;
            document.getElementById('clubConfigModal').classList.remove('hidden');
        }
        function closeClubConfigModal() {
            document.getElementById('clubConfigModal').classList.add('hidden');
        }

        function handlePlayerRegistration(e) {
            e.preventDefault();
            const newPlayer = {
                id: Date.now(),
                batch: document.getElementById('regBatch').value.trim(),
                name: document.getElementById('regName').value.trim(),
                position: document.getElementById('regPosition').value.trim(),
                joinYear: document.getElementById('regJoinYear').value.trim(),
                leaveYear: document.getElementById('regLeaveYear').value.trim() || 'Present',
                photo: document.getElementById('regPhoto').value.trim() || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80',
                details: document.getElementById('regDetails').value.trim()
            };

            playersData.push(newPlayer);
            localStorage.setItem('tzfc_players', JSON.stringify(playersData));
            activeBatchTab = newPlayer.batch;
            closeRegistrationModal();
            renderBatchTabs();
        }

        function handleClubConfigSave(e) {
            e.preventDefault();
            clubData = {
                name: document.getElementById('cfgClubName').value.trim(),
                motto: document.getElementById('cfgClubMotto').value.trim(),
                address: document.getElementById('cfgClubAddress').value.trim(),
                logo: document.getElementById('cfgClubLogo').value.trim(),
                groupPhoto: document.getElementById('cfgGroupPhoto').value.trim()
            };
            localStorage.setItem('tzfc_club_info', JSON.stringify(clubData));
            closeClubConfigModal();
            renderClubInfo();
        }

        function openPlayerProfile(id) {
            const player = playersData.find(p => p.id === id);
            if(!player) return;

            const content = document.getElementById('profileModalContent');
            content.innerHTML = `
                <div class="flex flex-col items-center text-center">
                    <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-tzfcGold shadow-xl mb-4 bg-slate-950">
                        <img src="${player.photo}" alt="${player.name}" class="w-full h-full object-cover">
                    </div>
                    <h2 class="text-2xl font-black text-white">${player.name}</h2>
                    <span class="bg-tzfcGold/20 text-tzfcGold border border-tzfcGold/30 text-xs px-3 py-1 rounded-full font-bold mt-2 uppercase tracking-wider">${player.position}</span>
                    
                    <div class="grid grid-cols-3 gap-4 w-full my-6 bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                        <div>
                            <span class="block text-xs text-slate-500 uppercase">ব্যাচ</span>
                            <strong class="text-white text-sm">${player.batch}</strong>
                        </div>
                        <div>
                            <span class="block text-xs text-slate-500 uppercase">ভর্তি সাল</span>
                            <strong class="text-white text-sm">${player.joinYear}</strong>
                        </div>
                        <div>
                            <span class="block text-xs text-slate-500 uppercase">ক্লাব ত্যাগ</span>
                            <strong class="text-white text-sm">${player.leaveYear}</strong>
                        </div>
                    </div>

                    <div class="w-full text-left bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <h4 class="text-xs font-semibold text-slate-400 uppercase mb-2"><i class="fa-solid fa-circle-info mr-1 text-tzfcGold"></i> ব্যক্তিগত তথ্য ও বায়োডাটা</h4>
                        <p class="text-slate-300 text-sm leading-relaxed">${player.details || 'কোনো অতিরিক্ত তথ্য যোগ করা হয়নি।'}</p>
                    </div>
                </div>
            `;
            document.getElementById('playerProfileModal').classList.remove('hidden');
        }

        function closePlayerProfileModal() {
            document.getElementById('playerProfileModal').classList.add('hidden');
        }

        window.onload = initApp;
    </script>
</body>
</html>
